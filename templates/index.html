<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Pedidos - Pateta</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <div class="container mt-5">
        <div class="col-md-10 mx-auto">

            <div class="card shadow">
                <div class="card-header bg-primary text-white text-center">
                    <h4>Cadastro de Pedido 🍔</h4>
                </div>

                <div class="card-body">

                    <!-- FORM CADASTRO -->
                    <form method="POST" action="/cadastrar">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label>Produto</label>
                                <input type="text" name="nome" class="form-control" required>
                            </div>

                            <div class="col-md-3 mb-3">
                                <label>Preço</label>
                                <input type="number" step="0.01" name="preco" class="form-control" required>
                            </div>

                            <div class="col-md-3 mb-3">
                                <label>Quantidade</label>
                                <input type="number" name="quantidade" class="form-control" required>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label>Data/Hora</label>
                            <input type="datetime-local" name="dataHora" class="form-control" required>
                        </div>

                        <div class="d-grid mb-3">
                            <button class="btn btn-success">Cadastrar Pedido</button>
                        </div>
                    </form>

                    <!-- BOTÃO DE BUSCA -->
                    <div class="d-grid mb-3">
                        <button class="btn btn-info" name="" data-bs-toggle="modal" data-bs-target="#modalBusca">
                            Pesquisar Pedido por ID
                        </button>
                    </div>

                    <!-- TABELA -->
                    <table class="table table-striped table-bordered">
                        <thead class="table-dark">
                            <tr>
                                <th>ID</th>
                                <th>Produto</th>
                                <th>Preço</th>
                                <th>Qtd</th>
                                <th>Data</th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody>
                            {% for produto in produtos %}
                            <tr>
                                <td>{{ produto.id }}</td>
                                <td>{{ produto.nome }}</td>
                                <td>{{ produto.preco }}</td>
                                <td>{{ produto.quantidade }}</td>
                                <td>{{ produto.dataHora }}</td>
                                <td>
                                    <button class="btn btn-warning btn-sm" data-bs-toggle="modal"
                                        data-bs-target="#modalEditar{{ produto.id }}">
                                        Editar</button> <br><br>
                                    <button class="btn btn-danger btn-sm" data-bs-toggle="modal"
                                        data-bs-target="#modalExcluir{{ produto.id }}">
                                        Excluir</button>
                                </td>
                            </tr>
                            <!-- MODAL EDITAR -->
                            <div class="modal fade" id="modalEditar{{ produto.id }}">
                                <div class="modal-dialog">
                                    <div class="modal-content">

                                        <form method="POST" action="/editar">
                                            <div class="modal-header">
                                                <h5>Editar Pedido</h5>
                                                <button class="btn-close" data-bs-dismiss="modal"></button>
                                            </div>

                                            <div class="modal-body">
                                                <input type="hidden" name="id" value="{{ produto.id }}">

                                                <input class="form-control mb-2" name="nome" placeholder="Produto" 
                                                value="{{ produto.nome }}">
                                                <input class="form-control mb-2" name="preco" type="number"
                                                value="{{ produto.preco }}">
                                                <input class="form-control mb-2" name="quantidade" type="number"
                                                value="{{ produto.quantidade }}">
                                                <input class="form-control mb-2" name="dataHora" type="datetime-local"
                                                value="{{ produto.dataHora }}">
                                            </div>

                                            <div class="modal-footer">
                                                <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                                                <button type="submit" class="btn btn-warning">Salvar</button>
                                            </div>
                                        </form>

                                    </div>
                                </div>
                            </div>
                            <!-- MODAL EXCLUIR -->
                            <div class="modal fade" id="modalExcluir{{ produto.id }}">
                                <div class="modal-dialog">
                                    <div class="modal-content">

                                        <form method="POST" action="/excluir">
                                            <div class="modal-header">
                                                <h5>Excluir Pedido</h5>
                                            </div>

                                            <div class="modal-body">
                                                <p>Deseja excluir: {{ produto.nome }}? </p>
                                                <input type="hidden" name="id" value="{{ produto.id }}">
                                            </div>

                                            <div class="modal-footer">
                                                <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                                                <button type="submit" class="btn btn-danger">Excluir</button>
                                            </div>
                                        </form>

                                    </div>
                                </div>
                            </div>
                            {% endfor %}

                        </tbody>
                    </table>

                </div>
            </div>
        </div>
    </div>

    <!-- MODAL BUSCA -->
    <div class="modal fade" id="modalBusca">
        <div class="modal-dialog">
            <div class="modal-content">

                <form method="POST" action="/buscar">
                    <div class="modal-header">
                        <h5>Pesquisar Pedido</h5>
                    </div>

                    <div class="modal-body">
                        <input class="form-control" name="id" placeholder="Digite o ID">
                    </div>

                    <div class="modal-footer">
                        <button class="btn btn-secondary" data-bs-dismiss="modal">Fechar</button>
                        <button type="submit" class="btn btn-info">Buscar</button>
                    </div>
                </form>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
